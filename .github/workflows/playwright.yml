name: Playwright Tests

on:
  workflow_dispatch:
    inputs:
      suite:
        description: Test suite to run
        required: true
        default: all
        type: choice
        options:
          - all
          - smoke
          - regression
          - tag
      tag:
        description: Cucumber tag expression, required when suite is tag
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Cucumber Tests
        shell: bash
        run: |
          suite="${{ github.event.inputs.suite || 'all' }}"
          tag="${{ github.event.inputs.tag || '' }}"

          case "$suite" in
            smoke)
              npx cucumber-js --tags "@smoke"
              ;;
            regression)
              npx cucumber-js --tags "@regression"
              ;;
            tag)
              if [ -z "$tag" ]; then
                echo "A tag expression is required when suite is 'tag'."
                exit 1
              fi
              npx cucumber-js --tags "$tag"
              ;;
            *)
              npx cucumber-js
              ;;
          esac

      - name: Upload Cucumber Report
        uses: actions/upload-artifact@v5
        if: ${{ !cancelled() }}
        with:
          name: cucumber-report
          path: reports/cucumber-report.html
          retention-days: 30
