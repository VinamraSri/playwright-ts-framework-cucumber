<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>MCP Test Runner UI</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main>
      <h1>MCP Test Runner</h1>
      <div id="tools"></div>

      <section>
        <label for="tag">Run by tag (e.g., @smoke):</label>
        <input id="tag" placeholder="@smoke" />
        <button id="runByTag">Run Tag</button>
      </section>

      <h2>Output</h2>
      <pre id="output"></pre>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
